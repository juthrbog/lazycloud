version: "3"

dotenv: [".env"]

vars:
  BINARY: lazycloud
  LOCALSTACK_ENDPOINT: http://localhost:4566

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ─── Build ──────────────────────────────────────────────

  build:
    desc: Build the binary
    cmds:
      - go build -o {{.BINARY}} .
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY}}"

  # ─── Development ────────────────────────────────────────

  dev:
    desc: Run the app against LocalStack
    deps: [localstack:up]
    cmds:
      - go run . --endpoint {{.LOCALSTACK_ENDPOINT}}
    env: &localstack-env
      AWS_ENDPOINT_URL: "{{.LOCALSTACK_ENDPOINT}}"
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1

  dev:watch:
    desc: Rebuild and run on file changes
    deps: [localstack:up]
    cmds:
      - task: build
      - ./{{.BINARY}} --endpoint {{.LOCALSTACK_ENDPOINT}}
    watch: true
    sources:
      - ./**/*.go
    env: *localstack-env

  run:
    desc: Run the app against real AWS (uses default profile)
    deps: [build]
    cmds:
      - ./{{.BINARY}}

  # ─── Testing ────────────────────────────────────────────

  test:
    desc: Run all tests
    cmds:
      - go test ./... -v

  test:integration:
    desc: Run integration tests against LocalStack
    deps: [localstack:up, localstack:seed]
    cmds:
      - go test ./... -v -tags=integration
    env: *localstack-env

  # ─── Linting ────────────────────────────────────────────

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    cmds:
      - gofmt -s -w .
      - goimports -w .

  # ─── LocalStack ─────────────────────────────────────────

  localstack:up:
    desc: Start LocalStack
    cmds:
      - docker compose up -d
      - echo "Waiting for LocalStack to be ready..."
      - bash -c 'for i in $(seq 1 30); do curl -s http://localhost:4566/_localstack/health | grep -q "available" && exit 0; sleep 1; done; echo "LocalStack failed to start" && exit 1'
      - echo "LocalStack is ready."
    status:
      - curl -s http://localhost:4566/_localstack/health | grep -q "available"

  localstack:down:
    desc: Stop LocalStack
    cmds:
      - docker compose down

  localstack:wipe:
    desc: Wipe all LocalStack data without stopping it
    cmds:
      - bash scripts/localstack-wipe.sh
    env: *localstack-env

  localstack:reset:
    desc: Stop LocalStack and wipe all data
    cmds:
      - docker compose down -v

  localstack:seed:
    desc: Seed LocalStack with test data
    cmds:
      - bash scripts/localstack-init/seed.sh
    env: *localstack-env

  localstack:logs:
    desc: Tail LocalStack logs
    cmds:
      - docker compose logs -f localstack

  # ─── Housekeeping ───────────────────────────────────────

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}
      - rm -rf .task/

  deps:
    desc: Download and tidy dependencies
    cmds:
      - go mod download
      - go mod tidy

  snapshot:
    desc: Build cross-platform binaries (requires goreleaser)
    cmds:
      - goreleaser build --snapshot --clean
