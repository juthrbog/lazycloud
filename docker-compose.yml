services:
  localstack:
    image: docker.io/localstack/localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,ec2
      - DEBUG=0
      - PERSISTENCE=1
    volumes:
      - "./scripts/localstack-init:/etc/localstack/init/ready.d"
      - "localstack-data:/var/lib/localstack"

volumes:
  localstack-data:
